# ============================================================
# 六、志愿填报规则（浙江特有：专业平行志愿）
# ============================================================
voluntary_rules:
  mode: "专业平行志愿"
  is_zhejiang_unique: true
  description: >
    浙江实行"专业+学校"为一个志愿单位，普通类一段、二段各可填80个专业平行志愿。
    这是全国最独特的志愿填报模式之一。
  key_features:
    - "以一个学校的一个专业（类）为一个志愿单位"
    - "考生可直接投档到具体专业，不存在专业调剂"
    - "每段可填80个志愿，按平行志愿规则投档"
    - "投档比例1:1，只要投档即录取（除非体检等特殊原因）"
  advantages:
    - "不存在被调剂到不喜欢的专业"
    - "可以全按自己的意愿排序"
    - "80个志愿可覆盖足够多的选择"
  disadvantages:
    - "需要仔细研究每个专业的具体情况"
    - "80个志愿排序需要大量准备工作"
    - "一些冷门专业可能出现无人填报的情况"

  strategy:
    rushing:
      ratio: "前20-30个"
      method: "位次比考生高5%-15%的专业"
    stable:
      ratio: "中间25-35个"
      method: "位次与考生匹配的专业"
    safety:
      ratio: "最后20-25个"
      method: "位次比考生低10%-30%的专业"

# ============================================================
# 七、升学多途径汇总
# ============================================================
admission_pathways:
  - pathway: "普通高考"
    type: "主流途径"
    suitable_for: "所有考生"
    timeline: "6月高考→6月底出分→7月录取"

  - pathway: "强基计划"
    type: "拔尖选拔"
    suitable_for: "成绩优异（全省前5%）+竞赛特长"
    timeline: "4月报名→高考→6月校测→7月初录取"
    notes: "录取在普通批次之前，一旦录取不再参加后续批次"

  - pathway: "三位一体"
    type: "综合评价"
    suitable_for: "学考成绩好+综合素质强的考生"
    timeline: "2-3月报名→4月校测→高考→6月底填报"

  - pathway: "高职提前招生"
    type: "提前录取"
    suitable_for: "成绩中等、适合高职的考生"
    timeline: "3月报名→4月测试→5月录取"

  - pathway: "艺术类招生"
    type: "专业类"
    suitable_for: "有艺术特长的考生"
    notes: "需参加省统考+校考（部分）"

  - pathway: "体育类招生"
    type: "专业类"
    suitable_for: "有体育特长的考生"

  - pathway: "保送生"
    type: "特殊通道"
    suitable_for: "奥赛国家集训队成员、外语类保送生"
    notes: "极少名额"

  - pathway: "高水平运动队/艺术团"
    type: "特殊通道"
    suitable_for: "运动/艺术特长生"
    notes: "2024年后政策收紧"

  - pathway: "地方专项计划"
    type: "政策照顾"
    suitable_for: "29个县区的农村户籍考生"

  - pathway: "定向招生"
    type: "定向就业"
    suitable_for: "愿意扎根基层的考生"

  - pathway: "港澳高校招生"
    type: "境外通道"
    notes: "香港中文大学（深圳）、香港科技大学（广州）等在内地招生"

# ============================================================
# 八、近年趋势变化
# ============================================================
trends:
  - year: "2024-2026"
    trend: "物理选考人数回升"
    impact: "物理保障机制启动概率降低，物理赋分环境改善"
    reason: "教育部选科指引实施后，物化双选成为主流"

  - year: "2024-2026"
    trend: "物化绑定趋势加强"
    impact: "不选化学的物理选考生专业选择面大幅缩小"
    reason: "教育部统一要求理工农医类专业必选物理+化学"

  - year: "2025-2026"
    trend: "三位一体招生院校和名额扩大"
    impact: "更多考生有机会通过综合评价进入优质高校"
    reason: "浙江省持续深化高考综合改革"

  - year: "2026"
    trend: "高职本科贯通培养扩大"
    impact: "中职学生升学通道拓宽"
    reason: "国家推进现代职业教育体系建设"

  - year: "2026"
    trend: "AI相关专业持续升温"
    impact: "计算机/人工智能/大数据类专业录取分数线可能进一步上涨"
    reason: "产业需求和就业预期"

# ============================================================
# 九、重要时间节点
# ============================================================
timeline:
  - month: "1月"
    events:
      - "选考科目首考（英语+7选3）"
      - "艺术类省统考成绩公布"
  - month: "2-3月"
    events:
      - "三位一体招生报名"
      - "高职提前招生报名"
      - "强基计划招生简章发布"
  - month: "4月"
    events:
      - "三位一体校测"
      - "高职提前招生测试"
      - "高校招生简章集中发布"
  - month: "5月"
    events:
      - "高校招生章程全部发布"
      - "招生计划汇总"
  - month: "6月7-10日"
    events:
      - "全国统一高考"
  - month: "6月中下旬"
    events:
      - "高考成绩公布"
      - "一分一段表公布"
      - "各批次分数线划定"
  - month: "6月底"
    events:
      - "普通类第一段志愿填报（约3天）"

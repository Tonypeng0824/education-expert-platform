# ============================================================
# 浙江省2026年高考政策知识库
# 数据来源：浙江省教育考试院 (www.zjzs.net)
# 最后更新：2026-06-05
# 维护注意：每年新建年份目录，历史数据保留在 historical/
# ============================================================

meta:
  province: "浙江"
  year: 2026
  gaokao_mode: "3+3"  # 语数外 + 7选3
  last_updated: "2026-06-05"

# ============================================================
# 一、高考改革背景（国家层面）
# ============================================================
national_reform_background:
  source: "国务院《关于深化考试招生制度改革的实施意见》（2014年9月）"
  core_principle: >
    新高考实施后，考生总成绩由统一高考的语文、数学、外语3个科目成绩
    和高中学业水平考试3个科目成绩组成。计入总成绩的高中学业水平考试科目，
    由考生根据报考高校要求和自身特长，在思想政治、历史、地理、物理、化学、
    生物等科目中自主选择（浙江多1门"技术"）。

  reform_goals:
    - goal: "保障考生选科自主权"
      description: "有利于文理兼通的个性化人才培养"
    - goal: "拓宽选择空间"
      description: "多种组合的选科，充分考虑考生的兴趣、爱好和特长发展"
    - goal: "增强学习动力"
      description: "学其所好、考其所长，促进选择能力和主体性培养"
    - goal: "衔接专业与职业"
      description: "选科时需考虑大学专业发展和未来职业规划"

  cross_province_comparison:
    note: "各省高考模式不同，浙江为'3+3'模式，以下为全国两种主要模式对比"
    mode_3_3:
      name: "3+3模式"
      provinces: ["上海", "浙江", "北京", "天津", "山东", "海南"]
      description: "语数外必考 + 从6科（浙江7科含技术）中任选3科"
      selection_count: 7  # 浙江
      total_combinations: 35  # C(7,3)
      scoring:
        mandatory: "原始分"
        elective: "等级赋分（各省自定具体办法）"
      key_feature: "不分文理科，完全自由选择"
      zhejiang_unique: "浙江是全国唯一设置'技术'选考科目的省份"

    mode_3_1_2:
      name: "3+1+2模式"
      provinces: ["河北", "辽宁", "江苏", "福建", "湖北", "湖南", "广东", "重庆", "及其他第三批后改革省份"]
      description: "语数外必考 + 物理/历史2选1（首选） + 化生政地4选2（再选）"
      total_combinations: 12  # 2 × C(4,2)
      scoring:
        mandatory: "原始分"
        preferred: "物理/历史：原始分（分列计划、分开划线）"
        re_elective: "化生政地：等级赋分"
      key_feature: "物理和历史分列招生计划、分别划线、分别投档"
      why_raw_score: >
        首选科目相同的考生使用同一试卷，考试群体相同，成绩具有可比性，
        因此物理或历史用原始分计入总成绩。
      why_converted_score: >
        再选科目（化生政地）因不同科目试卷难度可能不同、考生群体不同，
        原始分不具可比性，需要等级赋分以保证公平。

  why_converted_score_3_3:
    note: "浙江'3+3'模式下所有选考科目均需等级赋分"
    reason: >
      "3+3"模式中高考招生录取不分文理科。由于报考各选考科目的考生群体不同、
      试卷难度可能存在差异，其原始分数不具可比性，需要将不同科目的原始分
      按照一定规则进行等级赋分，让选择不同科目的考生公平参与录取。

# ============================================================
# 二、高考基本政策（浙江3+3模式）
# ============================================================
basic_policies:
  exam_structure:
    mandatory_subjects:
      - subject: "语文"
        full_score: 150
        exam_type: "全国统一命题"
      - subject: "数学"
        full_score: 150
        exam_type: "全国统一命题"
      - subject: "外语"
        full_score: 150
        exam_type: "全国统一命题"
        notes: "含听力30分；英语可考2次（1月+6月），取最高分"
    elective_subjects:
      mode: "7选3"
      options: ["物理", "化学", "生物", "政治", "历史", "地理", "技术"]
      full_score_per_subject: 100
      total_combinations: 35  # C(7,3)
      exam_type: "浙江省自主命题"
      notes: "选考科目可考2次（1月+6月），取最高分"
    total_full_score: 750

  scoring_system:
    elective_scoring:
      method: "等级赋分制"
      description: >
        选考科目按卷面分排名，划分21个等级，每个等级对应固定赋分。
        前1%赋分100分，前2%赋分97分，依此类推。
      grade_table:
        - grade: "A+"
          percentile: "前1%"
          assigned_score: 100
        - grade: "A"
          percentile: "前2%"
          assigned_score: 97
        - grade: "A-"
          percentile: "前3%"
          assigned_score: 94
        # ... 以此类推共21个等级
      key_implications:
        - "赋分不取决于绝对分数，而取决于你在选考该科目人群中的相对排名"
        - "选考人数多的科目（如地理）赋分更稳定"
        - "选考人数少的科目（如技术）赋分波动大"
        - "物理因选考人数增加+保障机制，赋分环境改善"

  admission_batches:
    batches:
      - name: "强基计划"
        order: 1
        description: "39所双一流A类高校基础学科拔尖人才选拔"
        notes: "高考前报名，高考后校测"
      - name: "综合评价招生"
        order: 2
        description: "复旦大学、上海交大、浙大、国科大等在浙综合评价录取"
        notes: "高考成绩占85%+校测15%"
      - name: "提前批"
        order: 3
        description: "军校、公安、航海、公费师范生、定向培养等"
        notes: "传统志愿，非平行志愿"
      - name: "普通类第一段"
        order: 4
        description: "按实考人数60%划定"
        notes: "平行志愿，可填80个专业平行志愿"
      - name: "普通类第二段"
        order: 5
        description: "按实考人数90%划定"
        notes: "平行志愿，可填80个专业平行志愿"
      - name: "普通类第三段（征求志愿）"
        order: 6
        description: "前两段录取后剩余计划"
        notes: "视情况设置"

# ============================================================
# 三、科学选科方法论
# ============================================================
subject_selection_methodology:
  source: "阳光高考网选科指导 + 教育部选科指引"
  description: "选科是高中阶段最重要的决策之一，需要综合考虑多方面因素"

  core_principles:
    - "了解本省招生政策和选考模式（浙江为3+3/7选3）"
    - "了解自身学习兴趣和优势，了解职业倾向和生涯规划，扬长避短"
    - "了解招生高校的专业（类）对选科的要求"
    - "参考省教育部门公布的《普通高校招生专业选考科目要求》"

  timing:
    rule: "选科不得早于高中一年级期末"
    advice: >
      考生可在进入高一后，根据自身情况和高校各专业（类）的选考科目要求，
      对选择哪些科目提前进行规划。同时也要按照《课程标准》要求完成
      未选科目的学习。

  decision_factors:
    - factor: "学科兴趣"
      weight: "高"
      description: "对哪些科目有持续的热情和好奇心"
    - factor: "学科能力"
      weight: "高"
      description: "各科的实际成绩表现，尤其是相对排名"
    - factor: "专业覆盖"
      weight: "高"
      description: "选科组合能报考的专业数量和方向"
    - factor: "职业规划"
      weight: "中高"
      description: "目标职业/行业对专业的要求"
    - factor: "赋分环境"
      weight: "中"
      description: "选考该科目的人群规模和质量（影响等级赋分排名）"
    - factor: "学校资源"
      weight: "中"
      description: "所在高中的师资力量和学科优势"
    - factor: "竞争策略"
      weight: "低中"
      description: "避开过于拥挤的赛道还是正面竞争"
    - factor: "发展潜力"
      weight: "中"
      description: "该科目对应专业方向的未来发展前景"

  decision_framework:
    step_1:
      name: "自我评估"
      actions:
        - "分析各科目前的成绩排名（校内和联考）"
        - "完成职业兴趣测评（如霍兰德测试）"
        - "思考自己真正喜欢和擅长的领域"
    step_2:
      name: "专业探索"
      actions:
        - "根据兴趣方向查阅相关专业信息"
        - "了解目标专业的选科要求"
        - "了解目标专业的就业方向和前景"
    step_3:
      name: "选科组合对比"
      actions:
        - "列出2-3个候选选科组合"
        - "对比各组合的专业覆盖率"
        - "对比各组合的赋分环境"
    step_4:
      name: "信息确认"
      actions:
        - "查阅教育部/省考试院最新选科要求文件"
        - "咨询学校老师（班主任、学科老师）"
        - "与家长充分沟通，达成一致"
    step_5:
      name: "动态调整"
      actions:
        - "高一上学期结束后，根据实际学习感受审视选科"
        - "必要时在合理范围内调整"

  common_pitfalls:
    - pitfall: "盲目跟风选物理"
      description: "听说物理覆盖广就跟风选，但物理难度大学不好反而拖后腿"
      advice: "物理需要较强的数学基础和逻辑思维，量力而行"
    - pitfall: "只看专业覆盖率"
      description: "只看组合覆盖多少专业，不考虑自己能否学好"
      advice: "学不好考不高，再好的组合也无法发挥价值"
    - pitfall: "忽视赋分机制"
      description: "不知道选考科目的赋分取决于相对排名"
      advice: "关注自己在选考人群中的相对位置，而非绝对分数"
    - pitfall: "不查具体专业要求"
      description: "凭感觉认为某专业不需要某科目"
      advice: "务必在教育部/省考试院官网查询具体专业的选科要求"
    - pitfall: "选科后才想职业方向"
      description: "选完科才发现想读的专业需要未选的科目"
      advice: "先有大致方向再选科，而非选完科再找方向"

# ============================================================
# 四、选考科目要求（教育部通用版 + 浙江特例）
# ============================================================
subject_requirements:
  # 教育部《普通高校本科招生专业选考科目要求指引（通用版）》
  general_rules:
    physics_chemistry_required:
      coverage: "约44%本科专业"
      typical_majors:
        - "计算机类（计算机科学与技术、软件工程、人工智能等）"
        - "电子信息类（电子信息工程、通信工程、微电子等）"
        - "临床医学、口腔医学、基础医学"
        - "电气类、自动化类"
        - "材料类、化工与制药类"
        - "生物医学工程"
    physics_required:
      coverage: "约8%本科专业"
      typical_majors:
        - "建筑学、城乡规划"
        - "部分管理科学与工程类"
        - "统计学（部分院校）"
    chemistry_required:
      coverage: "约5%本科专业"
      typical_majors:
        - "药学、中药学"
        - "部分护理学"
        - "部分农学类"
    no_restriction:
      coverage: "约43%本科专业"
      typical_majors:
        - "哲学、经济学、法学、教育学"
        - "文学、历史学"
        - "管理学（大部分）"
        - "艺术学"

  # 浙江特有的选科注意事项
  zhejiang_specific:
    technology_subject:
      name: "技术（信息技术+通用技术）"
      is_unique_to_zhejiang: true
      notes:
        - "全国唯一设置'技术'选考科目的省份"
        - "报考计算机类专业时，部分浙江高校认可技术科目"
        - "选考人数中等偏少，赋分有一定优势"
        - "省内高职院校对技术科目认可度较高"
    physics_guarantee:
      mechanism: "物理选考保障机制"
      threshold: 65000  # 选考人数低于6.5万时启动保障
      description: "当选考物理人数低于6.5万时，按6.5万人为基数进行等级赋分"
      status_2026: "预计选考人数超过保障线，机制可能不启动"
    two_exam_opportunities:
      description: "选考科目每年1月和6月各有1次考试机会，取最高分计入高考总分"
      strategy_implications:
        - "1月首考取得满意成绩后，6月可放弃该科专注于其他科目"
        - "大多数考生会利用两次机会分散压力"


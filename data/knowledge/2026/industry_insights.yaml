# ============================================================
# 行业洞察与选科对应知识库
# 数据来源：阳光高考网 (gaokao.chsi.com.cn) 重点领域专业需求
# 最后更新：2026-06-06
# 说明：将国家战略产业与选科要求进行映射，
#       帮助考生从"职业→专业→选科"反向规划
# ============================================================

meta:
  source: "阳光高考网重点领域专业需求 + 国家战略规划文件"
  last_updated: "2026-06-06"
  applicable_province: "浙江 (3+3模式)"
  key_reference_docs:
    - "十四五规划和2035远景目标纲要"
    - "教育强国建设规划纲要（2024-2035年）"
    - "战略性新兴产业分类（2018）"
    - "工业战略性新兴产业分类目录（2023）"

# ============================================================
# 一、选科-职业-国家战略衔接
# ============================================================
strategy_alignment:
  overview: >
    从智能芯片到深海深空，从新能源革命到数字中国，
    国家新质生产力正重塑人才需求图谱。
    考生选科时应结合国家战略方向和区域发展需求，
    实现个人发展与国家建设的有机统一。

  three_step_approach:
    step_1:
      name: "紧跟国家战略方向"
      description: >
        重点研读《十四五规划和2035远景目标纲要》《教育强国建设规划纲要
        （2024-2035年）》等纲领性文件，系统梳理科技创新、绿色低碳、
        数字经济、高端制造等关键领域。关注教育部、国家发改委等部门
        发布的政策和产业路线图，把握新一代信息技术、生物医药、
        量子科技等"未来赛道"。
      action:
        - "研读国家战略规划文件"
        - "梳理关键产业领域"
        - "关注权威部门产业政策"

    step_2:
      name: "分析区域战略定位和人才需求"
      description: >
        横向比对区域战略定位，纵向分析各地《紧缺人才需求目录》
        与特色产业链，了解区域重点产业布局及对应的专业人才需求，
        绘制"区域-产业-专业"对照表，锁定目标城市产业集群与人才缺口。
        将区域高校优势学科与国家、区域重点产业匹配。
      action:
        - "查看目标省份紧缺人才目录"
        - "分析区域产业链布局"
        - "绘制区域-产业-专业对照表"
        - "匹配高校优势学科与产业需求"

    step_3:
      name: "个人特质对接国家战略需求"
      description: >
        借助权威职业测评工具（如学职平台职业测评）进行科学评估，
        系统梳理自身核心竞争力（创新能力、逻辑思维、实践执行力等），
        基于测评结果锁定与战略领域契合度高的目标行业与岗位。
        强化学科优势与战略方向的深度融合。
      action:
        - "完成职业兴趣测评"
        - "梳理个人核心竞争力"
        - "锁定目标行业与岗位"
        - "匹配学科优势与战略方向"

# ============================================================
# 二、战略性新兴产业与选科映射
# ============================================================
strategic_industries:
  # --- 新一代信息技术 ---
  next_gen_it:
    name: "新一代信息技术"
    category: "战略性新兴产业"
    description: >
      包括下一代信息网络产业、电子核心产业、新兴软件和新型信息技术服务、
      互联网与云计算、大数据服务、人工智能等行业。
    sub_sectors:
      - "下一代信息网络（5G/6G、光通信）"
      - "电子核心产业（芯片、半导体）"
      - "新兴软件和新型信息技术服务"
      - "互联网与云计算"
      - "大数据服务"
      - "人工智能"
    related_majors:
      - "计算机科学与技术"
      - "软件工程"
      - "通信工程"
      - "人工智能"
      - "数据科学与大数据技术"
      - "微电子科学与工程"
      - "物联网工程"
      - "光电信息科学与工程"
      - "网络空间安全"
      - "集成电路设计与集成系统"
      - "云计算"
    subject_requirements:
      zhejiang_3_3:
        required: [物理, 化学]  # 物化双选
        note: "几乎所有IT类理工专业要求物理+化学"
        coverage_note: "选了物理+化学后，可覆盖绝大多数IT类专业"

  # --- 高端装备制造 ---
  high_end_equipment:
    name: "高端装备制造"
    category: "战略性新兴产业"
    description: >
      产业发展广泛涉及机械类、材料类、电子信息类、计算机类、
      能源动力类、航空宇航类、仪器类等专业类别。
    sub_sectors:
      - "智能制造装备"
      - "航空装备"
      - "卫星及应用"
      - "轨道交通装备"
      - "海洋工程装备"
    related_majors:
      - "机械设计制造及其自动化"
      - "机械工程"
      - "智能制造工程"
      - "材料科学与工程"
      - "电子信息工程"
      - "自动化"
      - "计算机科学与技术"
      - "航空航天工程"
      - "飞行器设计与工程"
      - "测控技术与仪器"
    subject_requirements:
      zhejiang_3_3:
        required: [物理, 化学]  # 物化双选
        note: "高端装备制造类专业几乎全部要求物理+化学"

  # --- 新能源汽车 ---
  new_energy_vehicles:
    name: "新能源汽车"
    category: "战略性新兴产业"
    description: >
      涵盖新能源汽车整车制造、动力电池、电机电控、智能网联、
      充电基础设施等全产业链。
    sub_sectors:
      - "新能源汽车整车"
      - "动力电池与储能"
      - "智能驾驶与车联网"
    related_majors:
      - "车辆工程"
      - "新能源汽车工程"
      - "储能科学与工程"
      - "新能源科学与工程"
      - "新能源材料与器件"
      - "电气工程及其自动化"
      - "智能科学与技术"
    subject_requirements:
      zhejiang_3_3:
        required: [物理, 化学]
        note: "工程类专业标配物化组合"

  # --- 生物技术 ---
  biotechnology:
    name: "生物技术"
    category: "战略性新兴产业"
    description: >
      涵盖生物医药、基因技术、生物育种、生物制造等方向。
    sub_sectors:
      - "生物医药"
      - "基因与细胞治疗"
      - "生物育种"
      - "合成生物学"
    related_majors:
      - "生物工程"
      - "生物医学工程"
      - "生物技术"
      - "生物信息学"
      - "化学生物学"
      - "生物科学"
    subject_requirements:
      zhejiang_3_3:
        required: [化学]  # 部分需物化，部分只需化学
        recommended: [物理, 化学, 生物]
        note: "生物医学工程类需物理+化学；纯生物科学类可能需要化学+生物"

  # --- 绿色环保/新能源 ---
  green_environmental:
    name: "绿色环保与新能源"
    category: "战略性新兴产业"
    description: >
      包括节能环保、清洁能源、碳中和技术等领域。
    sub_sectors:
      - "高效节能"
      - "先进环保"
      - "资源循环利用"
      - "碳中和"
    related_majors:
      - "环境科学与工程"
      - "能源与动力工程"
      - "新能源科学与工程"
      - "资源环境科学"
      - "应用气象学"
    subject_requirements:
      zhejiang_3_3:
        required: [物理, 化学]
        note: "环境与能源类工科专业基本要求物理+化学"

  # --- 新材料 ---
  new_materials:
    name: "新材料"
    category: "战略性新兴产业"
    description: >
      先进基础材料、关键战略材料、前沿新材料。
    sub_sectors:
      - "先进钢铁材料"
      - "先进有色金属材料"
      - "先进化工材料"
      - "高性能纤维及复合材料"
      - "前沿新材料（石墨烯、超导等）"
    related_majors:
      - "材料科学与工程"
      - "材料物理"
      - "材料化学"
      - "高分子材料与工程"
      - "纳米材料与技术"
      - "冶金工程"
    subject_requirements:
      zhejiang_3_3:
        required: [物理, 化学]

  # --- 数字创意 ---
  digital_creative:
    name: "数字创意产业"
    category: "战略性新兴产业"
    description: >
      数字文化创意、数字设计服务等。
    sub_sectors:
      - "数字文化创意"
      - "数字设计服务"
      - "虚拟现实/增强现实"
    related_majors:
      - "数字媒体技术"
      - "数字媒体艺术"
      - "视觉传达设计"
      - "动画"
      - "游戏设计"
    subject_requirements:
      zhejiang_3_3:
        tech_side:
          required: [物理]  # 数字媒体技术等工科方向
        art_side:
          required: []  # 艺术类通常不限选科
          note: "数字创意分技术和艺术两条路径，选科要求不同"

# ============================================================
# 三、未来产业方向
# ============================================================
future_industries:
  description: "面向未来的前沿产业方向，教育部已部署相关本科专业"

  industries:
    - name: "量子科技"
      related_majors: ["量子信息科学"]
      subject_hint: [物理, 化学]

    - name: "人工智能+"
      related_majors: ["人工智能", "智能科学与技术", "机器人工程"]
      subject_hint: [物理, 化学]

    - name: "深空深海深地"
      related_majors: ["航空航天工程", "海洋工程与技术", "地质工程"]
      subject_hint: [物理, 化学]

    - name: "碳中和"
      related_majors: ["碳储科学与工程", "新能源科学与工程", "能源与环境系统工程"]
      subject_hint: [物理, 化学]

    - name: "精准医学"
      related_majors: ["临床医学", "基础医学", "生物信息学"]
      subject_hint: [物理, 化学, 生物]

    - name: "下一代互联网"
      related_majors: ["网络空间安全", "区块链工程", "密码科学与技术"]
      subject_hint: [物理, 化学]

# ============================================================
# 四、选科推荐矩阵（基于行业方向）
# ============================================================
recommendation_matrix:
  description: "根据目标行业方向推荐最优选科组合"

  tech_comprehensive:  # 全面覆盖科技/工程
    target: "计算机、电子、智能制造、航空航天等高覆盖率方向"
    recommended_combo: ["物理", "化学", "技术"]
    rationale: "物化保障理工专业全覆盖，技术科目为浙江特有优势"
    coverage: "约92%专业可报考"

  tech_plus_bio:  # 科技+生物
    target: "IT + 生物医药/医学方向"
    recommended_combo: ["物理", "化学", "生物"]
    rationale: "物化生是医学和生物的黄金组合"
    coverage: "约95%专业可报考"

  tech_plus_geo:  # 科技+地理
    target: "IT + 地理信息/环境方向"
    recommended_combo: ["物理", "化学", "地理"]
    rationale: "地理赋分稳定，且GIS/遥感方向有前景"
    coverage: "约90%专业可报考"

  interdisciplinary:  # 文理交叉
    target: "经济管理+信息技术交叉方向"
    recommended_combo: ["物理", "政治", "技术"]
    rationale: "物理保理工门槛，政治保法学/公安，技术支持"
    coverage: "约75%专业可报考"

  humanities_social:  # 人文社科
    target: "法学、经济、新闻、教育等"
    recommended_combo: ["历史", "政治", "地理"]
    rationale: "经典文科组合"
    coverage: "约45%专业可报考"

# ============================================================
# 五、区域发展参考
# ============================================================
regional_reference:
  description: >
    不同区域有不同产业定位，选科时可结合目标就业区域规划。
    参考各地《紧缺人才需求目录》进行分析。

  zhejiang_focus:
    province: "浙江"
    key_industries:
      - "数字经济（杭州-互联网/AI/大数据）"
      - "智能制造（宁波-高端装备/新材料）"
      - "新能源汽车（台州/金华-汽车零部件）"
      - "生命健康（杭州/绍兴-生物医药）"
      - "时尚产业（杭州/温州-设计/品牌）"
    university_industry_match:
      - university: "浙江大学"
        strengths: ["计算机", "控制科学", "临床医学", "材料科学"]
      - university: "杭州电子科技大学"
        strengths: ["电子信息", "计算机", "自动化", "通信工程"]
      - university: "浙江工业大学"
        strengths: ["化学工程", "机械工程", "制药工程"]
      - university: "宁波大学"
        strengths: ["力学", "水产", "信息与通信工程"]
      - university: "温州医科大学"
        strengths: ["临床医学", "眼视光医学", "药学"]

  beijing_tianjin_hebei:
    region: "京津冀"
    key_industries:
      - "人工智能/信息技术（北京中关村）"
      - "生物医药（北京亦庄/天津滨海）"
      - "航空航天（天津）"
      - "新能源（河北张家口/雄安）"

  yangtze_delta:
    region: "长三角"
    key_industries:
      - "集成电路（上海/无锡/合肥）"
      - "新能源汽车（上海/合肥）"
      - "生物医药（上海张江/苏州）"
      - "智能制造（苏州/无锡/常州）"

  pearl_river_delta:
    region: "粤港澳大湾区"
    key_industries:
      - "信息技术（深圳/广州）"
      - "金融科技（深圳/香港）"
      - "智能制造（东莞/佛山）"
      - "海洋经济（珠海/深圳）"

  central_west:
    region: "中西部"
    key_industries:
      - "航空航天（成都/西安）"
      - "新能源材料（西宁/包头）"
      - "电子信息（成都/重庆/武汉/西安）"
      - "装备制造（长沙/武汉/郑州）"

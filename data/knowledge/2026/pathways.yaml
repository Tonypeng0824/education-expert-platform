# ============================================================
# 浙江省高考升学多途径知识库
# 涵盖所有可用的升学路径及条件
# ============================================================

meta:
  year: 2026
  province: "浙江"
  last_updated: "2026-06-05"

pathways:
  # ========== 途径1：普通高考（主流） ==========
  normal_gaokao:
    name: "普通高考"
    type: "主流途径"
    suitable_for: "所有考生"
    timeline:
      - "3月：高考报名确认"
      - "6月7-10日：高考"
      - "6月26日左右：出分"
      - "6月29-30日：一段志愿填报"
      - "7月中旬：一段录取"
      - "7月24-25日：二段志愿填报"
    required_materials:
      - "高考成绩"
      - "选考科目符合专业要求"
    notes: "80个专业平行志愿，不需调剂"

  # ========== 途径2：强基计划 ==========
  qiangji_plan:
    name: "强基计划"
    type: "拔尖选拔"
    suitable_for: "成绩全省前列（前3%-5%）+ 学科特长"
    participating_schools: 39  # 39所双一流A类
    timeline:
      - "4月：各校发布简章，网上报名"
      - "6月：参加高考"
      - "6月中下旬：入围名单公布（高考出分前）"
      - "6月底-7月初：高校校测（笔试+面试+体测）"
      - "7月5日前：录取"
    key_points:
      - "只能报1所学校"
      - "录取在普通批次前，一旦录取不再参加后续录取"
      - "入围倍数：一般为招生计划的3-6倍"
      - "综合成绩 = 高考85% + 校测15%"
    risks:
      - "强基录取后不能放弃参加普通批次"
      - "基础学科培养，研究生阶段才能转应用方向"
      - "校测竞争激烈，需提前准备"

  # ========== 途径3：三位一体（浙江特色） ==========
  trinity:
    name: "三位一体综合评价招生"
    type: "综合评价（浙江特色）"
    suitable_for: "学考A/B等级多 + 综合素质突出 + 高考成绩中等偏上"
    levels:
      - level: "高水平大学"
        schools: ["复旦大学", "上海交通大学", "浙江大学", "中国科学院大学", "南方科技大学", "香港中文大学（深圳）", "华南理工大学", "上海科技大学", "北京外国语大学"]
        gaokao_weight: "85%"
        interview_weight: "10-15%"
        xuekao_weight: "少量参考"
      - level: "省属高校"
        schools: "40+所浙江省属本科院校"
        gaokao_weight: "60%"
        interview_weight: "25-30%"
        xuekao_weight: "10-15%"
    timeline:
      - "2-3月：各校发布简章，网上报名"
      - "3-4月：材料初审"
      - "4-5月：校测（面试为主）"
      - "高考后：公布入围名单"
      - "6月底：填报提前批志愿"
    strategy:
      - "可同时报多所省属高校（不冲突）"
      - "高水平大学通常只能选择1-2所"
      - "三位一体是浙江考生进入名校的重要'捷径'"
      - "省属高校三位一体是中等偏上考生'捡漏'的好机会"

  # ========== 途径4：高职提前招生（浙江特色） ==========
  vocational_early:
    name: "高职提前招生"
    type: "提前录取（浙江特色）"
    suitable_for: "学考成绩较好 + 适合职业教育方向"
    timeline:
      - "3月：各高职院校发布简章"
      - "3-4月：报名"
      - "4月：综合素质测试"
      - "5月：录取（高考前）"
    key_points:
      - "一旦录取，不再参加高考"
      - "以学考成绩 + 校测成绩为主要依据"
      - "适合目标明确要走职业教育道路的考生"
    participating_schools: "浙江省内40+所高职院校"

  # ========== 途径5：艺术类 ==========
  art_exam:
    name: "艺术类招生"
    type: "专业类"
    suitable_for: "有艺术特长的考生"
    categories:
      - "美术与设计类"
      - "音乐类"
      - "舞蹈类"
      - "表（导）演类"
      - "播音与主持类"
      - "书法类"
    timeline:
      - "12月：省统考"
      - "1-3月：校考（部分院校）"
      - "6月：文化课高考"
      - "6月底：艺术类志愿填报"
    notes: "2024年起文化课要求提高，统考成绩占比增大"

  # ========== 途径6：体育类 ==========
  sports:
    name: "体育类招生"
    type: "专业类"
    suitable_for: "有体育特长的考生"
    timeline:
      - "5月：省统考（术科考试）"
      - "6月：文化课高考"
      - "6月底：体育类志愿填报"

  # ========== 途径7：定向招生（浙江特色） ==========
  targeted:
    name: "定向招生"
    type: "定向就业（浙江特色）"
    suitable_for: "愿意扎根基层/特定行业的考生"
    types:
      - name: "基层卫生人才定向"
        benefits: ["免学费", "生活费补助", "毕业后有编制"]
        obligation: "定向服务6年（含规培）"
        target_location: "乡镇卫生院"
        typical_schools: ["温州医科大学", "浙江中医药大学", "杭州师范大学"]
      - name: "基层农技人员定向"
        benefits: ["免学费", "就业保障"]
        obligation: "定向服务5年"
        target_location: "乡镇农技推广机构"
        typical_schools: ["浙江农林大学"]
      - name: "中小学教师定向"
        benefits: ["免学费", "毕业后有编制"]
        obligation: "定向服务6年"
        target_location: "偏远地区中小学"
        typical_schools: ["浙江师范大学", "杭州师范大学", "湖州师范学院"]
      - name: "人民武装定向"
        target_location: "基层武装部"
      - name: "粮油储检定向"
        target_location: "粮储系统"
    notes: "定向招生分数线通常低于同校普通批次，但需履行服务义务"

  # ========== 途径8：地方专项计划 ==========
  local_special:
    name: "浙江省地方专项计划"
    type: "政策照顾"
    suitable_for: "29个指定县区的农村户籍考生"
    eligible_regions:
      - "淳安县"
      - "文成县"
      - "泰顺县"
      - "永嘉县"
      - "苍南县"
      - "平阳县"
      - "武义县"
      - "磐安县"
      - "衢州市柯城区、衢江区、龙游县、江山市、常山县、开化县"
      - "舟山市定海区、普陀区、岱山县、嵊泗县"
      - "台州市黄岩区、临海市、温岭市、玉环市、天台县、仙居县、三门县"
      - "丽水市莲都区、龙泉市、青田县、云和县、庆元县、缙云县、遂昌县、松阳县、景宁畲族自治县"
    requirements:
      - "户籍在指定县区"
      - "当地高中连续3年学籍并实际就读"
      - "符合高考报名条件"
    benefits: "分数线低于同校普通批次"
    schools: "浙江省属重点高校"

  # ========== 途径9：保送生 ==========
  recommended:
    name: "保送生"
    type: "特殊通道"
    suitable_for: "极少数顶尖学生"
    categories:
      - "中学生学科奥林匹克竞赛国家集训队成员"
      - "部分外国语中学推荐的外语类保送生"
    timeline:
      - "1-2月：报名和测试"
      - "高考前：录取"

  # ========== 途径10：港澳高校 ==========
  hk_macau:
    name: "港澳高校招生"
    type: "境外通道"
    suitable_for: "英语好 + 家庭经济条件较好 + 有境外升学意向"
    schools:
      - "香港大学"
      - "香港中文大学"
      - "香港科技大学"
      - "香港理工大学"
      - "香港城市大学"
      - "香港浸会大学"
      - "澳门大学"
      - "澳门科技大学"
    timeline:
      - "10月-次年4月：各校陆续开放申请"
      - "6月：高考后部分学校面试"
      - "7月：录取"
    notes:
      - "不影响内地高考录取（部分学校除外）"
      - "学费+生活费：约15-25万港币/年"
      - "高考成绩+英语成绩要求高"

  # ========== 途径11：中外合作办学 ==========
  sino_foreign:
    name: "中外合作办学"
    type: "特殊类型"
    suitable_for: "英语好 + 家庭经济条件好"
    zhejiang_schools:
      - "宁波诺丁汉大学"
      - "温州肯恩大学"
      - "浙江大学国际校区（海宁）"
      - "浙江科技大学中德合作"
    outside_zhejiang:
      - "西交利物浦大学（苏州）"
      - "昆山杜克大学"
      - "上海纽约大学"
      - "广东以色列理工学院"
      - "北京师范大学-香港浸会大学联合国际学院（珠海）"
    tuition_range: "6万-18万元/年"
    admission:
      - "通过高考成绩录取（多数）"
      - "部分学校有校园日/综合评价录取"
